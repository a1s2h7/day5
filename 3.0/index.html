<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>好きな飲み物アンケート</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f5f7f9;
            --card-bg: #ffffff;
            --text-color: #333;
            --border-radius: 8px;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        h1 {
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: var(--primary-color);
        }

        .voting-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .option {
            display: flex;
            align-items: center;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .option:hover {
            background-color: #f0f4f8;
        }

        .option input {
            margin-right: 1rem;
        }

        button {
            margin-top: 1rem;
            padding: 0.75rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        .results {
            margin-top: 2rem;
            border-top: 2px solid #eee;
            padding-top: 1.5rem;
        }

        .result-item {
            margin-bottom: 1rem;
        }

        .result-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.25rem;
            font-size: 0.9rem;
        }

        .progress-bar {
            background-color: #eee;
            height: 12px;
            border-radius: 6px;
            overflow: hidden;
        }

        .progress-fill {
            background-color: var(--primary-color);
            height: 100%;
            width: 0%;
            transition: width 0.5s ease-out;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>好きな飲み物は？</h1>
    
    <form id="voting-form" class="voting-form">
        <label class="option">
            <input type="radio" name="drink" value="orange" required>
            オレンジジュース
        </label>
        <label class="option">
            <input type="radio" name="drink" value="apple">
            アップルジュース
        </label>
        <label class="option">
            <input type="radio" name="drink" value="oolong">
            ウーロン茶
        </label>
        <label class="option">
            <input type="radio" name="drink" value="ginger">
            ジンジャエール
        </label>
        <button type="submit">投票する</button>
    </form>

    <div id="results-section" class="results">
        <h2>現在の結果</h2>
        <div id="result-list">
            <!-- 結果がここに挿入されます -->
            <div class="result-item" data-drink="orange">
                <div class="result-label">
                    <span>オレンジジュース</span>
                    <span class="count">0票</span>
                </div>
                <div class="progress-bar"><div class="progress-fill"></div></div>
            </div>
            <div class="result-item" data-drink="apple">
                <div class="result-label">
                    <span>アップルジュース</span>
                    <span class="count">0票</span>
                </div>
                <div class="progress-bar"><div class="progress-fill"></div></div>
            </div>
            <div class="result-item" data-drink="oolong">
                <div class="result-label">
                    <span>ウーロン茶</span>
                    <span class="count">0票</span>
                </div>
                <div class="progress-bar"><div class="progress-fill"></div></div>
            </div>
            <div class="result-item" data-drink="ginger">
                <div class="result-label">
                    <span>ジンジャエール</span>
                    <span class="count">0票</span>
                </div>
                <div class="progress-bar"><div class="progress-fill"></div></div>
            </div>
        </div>
    </div>
</div>

<script>
    const form = document.getElementById('voting-form');
    
    // 選択肢のIDとサーバーに送る表示名のマッピング
    const drinkLabels = {
        'orange': 'オレンジジュース',
        'apple': 'アップルジュース',
        'oolong': 'ウーロン茶',
        'ginger': 'ジンジャエール'
    };

    /**
     * サーバーから最新の集計結果を取得して画面を更新する
     */
    async function updateDisplay() {
        try {
            const response = await fetch('/votes');
            if (!response.ok) throw new Error('取得失敗');
            
            const results = await response.json();
            
            // 全ての選択肢を 0票で初期化
            const voteCounts = { orange: 0, apple: 0, oolong: 0, ginger: 0 };
            let total = 0;

            // サーバーのデータをマッピング
            results.forEach(row => {
                const key = Object.keys(drinkLabels).find(k => drinkLabels[k] === row.option);
                if (key) {
                    voteCounts[key] = row.count;
                    total += row.count;
                }
            });

            // HTML要素の更新
            for (const [id, count] of Object.entries(voteCounts)) {
                const item = document.querySelector(`.result-item[data-drink="${id}"]`);
                const countText = item.querySelector('.count');
                const bar = item.querySelector('.progress-fill');
                
                const percent = total === 0 ? 0 : (count / total) * 100;
                
                countText.textContent = `${count}票`;
                bar.style.width = `${percent}%`;
            }
        } catch (error) {
            console.error('結果の更新中にエラーが発生しました:', error);
        }
    }

    /**
     * フォーム送信時の処理
     */
    form.addEventListener('submit', async (event) => {
        event.preventDefault();
        
        const selectedValue = form.drink.value;
        const optionName = drinkLabels[selectedValue];

        if (!optionName) return;

        try {
            // 投票を送信 (POST)
            const response = await fetch('/vote', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ option: optionName })
            });

            if (response.ok) {
                // 成功したら表示を更新
                await updateDisplay();
                form.reset();
            } else {
                alert('投票の送信に失敗しました。');
            }
        } catch (error) {
            console.error('通信エラーが発生しました:', error);
            alert('サーバーと通信できませんでした。');
        }
    });

    // ページ読み込み時に初期データを取得
    updateDisplay();
</script>

</body>
</html>
